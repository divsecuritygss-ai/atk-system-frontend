name: Build Android Hybrid APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Compile and Sign Android APK
    runs-on: ubuntu-latest

    steps:
      # Mengambil kode sumber dari repositori GitHub menggunakan v4
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Mengonfigurasi lingkungan runtime Node.js versi 22 menggunakan v4 (Kebutuhan Minimum Capacitor CLI terbaru)
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Memasang dependensi npm proyek
      - name: Install Dependencies
        run: |
          npm install

      # Membuat folder kompilasi produksi (dist)
      - name: Build Web Dist Folder
        run: |
          npm run build

      # Menyiapkan Java Development Kit (JDK) 17 untuk Android SDK menggunakan v4
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Memasang peralatan Android SDK versi terbaru menggunakan v3
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Sinkronisasi aset web ke folder native Android menggunakan Capacitor
      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      # Melakukan kompilasi proyek native menjadi berkas APK Android (Debug)
      - name: Build Android Debug APK
        run: |
          cd android && ./gradlew assembleDebug

      # Mengunggah hasil APK yang selesai dirakit ke tab Artifacts menggunakan v4
      - name: Upload Compile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATK-System-Enterprise-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk